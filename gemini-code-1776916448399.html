<!doctype html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiesta de Princesa - Mariel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes crownBounce { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
        .float-anim { animation: float 3s ease-in-out infinite; }
        .float-anim-delay { animation: float 3s ease-in-out 1s infinite; }
        .float-anim-delay2 { animation: float 3s ease-in-out 2s infinite; }
        .sparkle { position:absolute; width:8px; height:8px; background:gold; border-radius:50%; animation: sparkle 2s ease-in-out infinite; }
        .fade-up { animation: fadeUp 0.8s ease-out forwards; opacity:0; }
        .crown-bounce { animation: crownBounce 2s ease-in-out infinite; }
        .princess-card { backdrop-filter: blur(10px); background-color: rgba(255, 255, 255, 0.8); border: 1px solid #f9a8d4; }
        .btn-princess {
            background: linear-gradient(135deg, #e91e90, #ff6fb5);
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(233,30,144,0.4);
        }
        .btn-princess:hover { transform:translateY(-2px); box-shadow:0 6px 25px rgba(233,30,144,0.5); }
        .input-princess { border: 2px solid #f0c4e0; outline: none; }
        .input-princess:focus { border-color: #e91e90; box-shadow: 0 0 0 3px rgba(233,30,144,0.15); }
        .castle-bg { background: linear-gradient(180deg, #fce4f3 0%, #fdf2f8 30%, #fff5fc 100%); }
        .counter-btn {
            width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-weight:700; font-size:1.2rem; cursor:pointer; transition:all 0.2s; border:2px solid #f0c4e0;
            background:#fff; color:#e91e90;
        }
    </style>
</head>
<body class="h-full">
    <div id="app" class="w-full h-full overflow-auto castle-bg" style="font-family:'Quicksand',sans-serif;">
        <div class="sparkle" style="top:8%;left:10%;animation-delay:0s;"></div>
        <div class="sparkle" style="top:15%;left:85%;animation-delay:0.5s;"></div>
        <div class="sparkle" style="top:40%;left:5%;animation-delay:1s;"></div>
        <div class="sparkle" style="top:80%;left:15%;animation-delay:0.8s;"></div>

        <div id="view-invite" class="min-h-full flex flex-col items-center justify-center px-4 py-8 relative text-center">
            <div class="crown-bounce mb-2 fade-up" style="animation-delay:0.1s;">
                <svg width="80" height="60" viewBox="0 0 80 60" fill="none"><path d="M5 50L15 15L28 35L40 5L52 35L65 15L75 50H5Z" fill="#FFD700" stroke="#e6a800" stroke-width="2" /> <circle cx="15" cy="13" r="4" fill="#FF69B4" /> <circle cx="40" cy="3" r="5" fill="#FF1493" /> <circle cx="65" cy="13" r="4" fill="#FF69B4" /> <rect x="5" y="48" width="70" height="8" rx="3" fill="#FFD700" stroke="#e6a800" stroke-width="1" /></svg>
            </div>
            <p class="text-pink-400 font-semibold tracking-widest uppercase text-sm fade-up mb-1" style="animation-delay:0.2s;">Estás invitado a la fiesta de</p>
            <h1 class="fade-up mb-1" style="font-family:'Great Vibes',cursive; color:#e91e90; font-size:3.5rem; animation-delay:0.3s;">Mariel</h1>
            <p class="text-pink-300 text-lg fade-up mb-6" style="animation-delay:0.35s;">👑 Fiesta de Princesas 👑</p>

            <div class="flex gap-4 mb-6 fade-up" style="animation-delay:0.4s;">
                <div class="float-anim text-center">
                    <svg width="50" height="70" viewBox="0 0 60 90"><circle cx="30" cy="18" r="12" fill="#FFE4B5" /><rect x="22" y="30" width="16" height="25" rx="5" fill="#FFD700" /><path d="M15 55 Q30 90 45 55" fill="#FFD700" /></svg>
                    <span class="block text-xs text-pink-400 font-semibold">Bella</span>
                </div>
                <div class="float-anim-delay text-center">
                    <svg width="50" height="70" viewBox="0 0 60 90"><circle cx="30" cy="18" r="12" fill="#FFE4B5" /><rect x="22" y="30" width="16" height="25" rx="5" fill="#4FC3F7" /><path d="M15 55 Q30 90 45 55" fill="#4FC3F7" /></svg>
                    <span class="block text-xs text-pink-400 font-semibold">Cenicienta</span>
                </div>
            </div>

            <div class="princess-card rounded-3xl p-6 max-w-sm w-full shadow-lg fade-up mb-6" style="animation-delay:0.5s;">
                <div class="space-y-3">
                    <div class="flex items-center justify-center gap-2 text-pink-600"><i data-lucide="calendar"></i> <span class="font-bold">23 de Mayo</span></div>
                    <div class="flex items-center justify-center gap-2 text-pink-600"><i data-lucide="clock"></i> <span class="font-bold">1:00 PM</span></div>
                    <div class="flex items-center justify-center gap-2 text-pink-600"><i data-lucide="map-pin"></i> <span class="font-bold">Rancho La Chula</span></div>
                </div>
            </div>

            <button onclick="showForm()" class="btn-princess text-white font-bold py-4 px-10 rounded-full text-lg fade-up" style="animation-delay:0.6s;"> ✨ Confirmar Asistencia ✨ </button>
        </div>

        <div id="view-form" class="min-h-full flex flex-col items-center justify-center px-4 py-8 hidden">
            <h2 class="text-pink-600 mb-6 text-center" style="font-family:'Great Vibes',cursive; font-size:2.5rem;">Confirmar Asistencia</h2>
            <div class="princess-card rounded-3xl p-6 max-w-sm w-full shadow-lg space-y-5">
                <div>
                    <label class="block text-pink-600 font-semibold mb-1 text-sm">Tu Nombre</label>
                    <input type="text" id="guest-name" placeholder="Escribe tu nombre" class="input-princess w-full rounded-xl px-4 py-3 text-gray-700 bg-white">
                </div>
                
                <div class="flex flex-col gap-4">
                    <div class="flex justify-between items-center">
                        <span class="text-pink-600 font-semibold">👨‍👩‍👧 Adultos</span>
                        <div class="flex items-center gap-3">
                            <button class="counter-btn" onclick="changeCount('adults', -1)">-</button>
                            <span id="count-adults" class="font-bold text-pink-600 w-4 text-center">1</span>
                            <button class="counter-btn" onclick="changeCount('adults', 1)">+</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-pink-600 font-semibold">👦 Niños</span>
                        <div class="flex items-center gap-3">
                            <button class="counter-btn" onclick="changeCount('boys', -1)">-</button>
                            <span id="count-boys" class="font-bold text-pink-600 w-4 text-center">0</span>
                            <button class="counter-btn" onclick="changeCount('boys', 1)">+</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-pink-600 font-semibold">👧 Niñas</span>
                        <div class="flex items-center gap-3">
                            <button class="counter-btn" onclick="changeCount('girls', -1)">-</button>
                            <span id="count-girls" class="font-bold text-pink-600 w-4 text-center">0</span>
                            <button class="counter-btn" onclick="changeCount('girls', 1)">+</button>
                        </div>
                    </div>
                </div>

                <button onclick="sendWhatsApp()" class="btn-princess text-white font-bold py-3 px-6 rounded-full w-full text-lg"> 💌 Enviar Confirmación </button>
                <button onclick="showInvite()" class="text-pink-400 text-sm underline w-full text-center">← Volver</button>
            </div>
        </div>
    </div>

    <script>
        const counts = { adults: 1, boys: 0, girls: 0 };
        const myPhone = "522281276797"; // Tu número de WhatsApp

        function showForm() {
            document.getElementById('view-invite').classList.add('hidden');
            document.getElementById('view-form').classList.remove('hidden');
        }

        function showInvite() {
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-invite').classList.remove('hidden');
        }

        function changeCount(type, delta) {
            counts[type] = Math.max(0, counts[type] + delta);
            if (type === 'adults') counts[type] = Math.max(1, counts[type]);
            document.getElementById('count-' + type).textContent = counts[type];
        }

        function sendWhatsApp() {
            const name = document.getElementById('guest-name').value.trim();
            if (!name) {
                alert('Por favor escribe tu nombre 💕');
                return;
            }

            let msg = `🎀 *Confirmación de Asistencia* 🎀\n\n`;
            msg += `👑 Fiesta de Princesas de *Mariel*\n\n`;
            msg += `📝 Nombre: *${name}*\n`;
            msg += `👨‍👩‍👧 Adultos: *${counts.adults}*\n`;
            if (counts.boys > 0) msg += `👦 Niños: *${counts.boys}*\n`;
            if (counts.girls > 0) msg += `👧 Niñas: *${counts.girls}*\n`;
            msg += `\n✨ Total: *${counts.adults + counts.boys + counts.girls}*\n`;
            msg += `\n¡Ahí estaremos! 🏰💖`;

            const url = `https://wa.me/${myPhone}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        // Inicializar iconos
        lucide.createIcons();
    </script>
</body>
</html>
