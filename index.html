<!doctype html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Real - Mariel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            cursor: url('https://img.icons8.com/fluency/32/magic-wand.png'), auto;
            overflow: hidden;
            height: 100%;
            background: #fdf2f8;
        }
        
        /* Estela del mouse */
        .magic-trail {
            position: fixed;
            width: 12px; height: 12px;
            background: radial-gradient(circle, #fff, #ff6fb5);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 15px #ff6fb5, 0 0 30px #ff0080;
            animation: trailFade 0.8s ease-out forwards;
            z-index: 9999;
        }
        @keyframes trailFade { 0% { opacity: 1; transform: scale(1.5); } 100% { opacity: 0; transform: scale(0); } }

        /* Estrellas cayendo */
        .sparkle-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            animation: sparkleFall linear forwards;
            filter: drop-shadow(0 0 5px gold);
        }
        @keyframes sparkleFall {
            0% { transform: translateY(-20px) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translateY(10vh) scale(1.2); }
            100% { transform: translateY(105vh) scale(0.5); opacity: 0; }
        }

        .princess-card { backdrop-filter: blur(15px); background-color: rgba(255, 255, 255, 0.8); border: 1.5px solid rgba(249, 168, 212, 0.5); }
        
        .btn-magic {
            background: linear-gradient(135deg, #f472b6, #db2777);
            animation: pulseGlow 2s infinite;
            transition: all 0.3s;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px #f472b6; }
            50% { box-shadow: 0 0 25px #db2777; transform: scale(1.02); }
        }

        .castle-bg { background: linear-gradient(180deg, #fce4f3 0%, #fdf2f8 30%, #fff5fc 100%); }
        .fade-up { animation: fadeUp 1s ease-out forwards; opacity:0; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
        
        .counter-btn {
            width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center;
            border:2px solid #f0c4e0; background:#fff; color:#db2777; font-weight: bold;
        }
    </style>
</head>
<body class="h-full castle-bg">

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>
    <audio id="magicSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="app" class="w-full h-full overflow-auto relative">
        <div id="view-invite" class="min-h-full flex flex-col items-center justify-center px-4 py-8 text-center relative z-10">
            <p class="text-pink-400 font-bold tracking-widest uppercase text-xs fade-up mb-2">Una invitación real para</p>
            <h1 class="fade-up mb-2" style="font-family:'Great Vibes',cursive; color:#db2777; font-size:5rem; text-shadow: 2px 2px 10px rgba(219,39,119,0.2);">Mariel</h1>
            <p class="text-pink-400 text-lg fade-up mb-12">✨ Mis XV Primaveras ✨</p>

            <div class="princess-card rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl fade-up mb-12" style="animation-delay:0.3s;">
                <div class="space-y-6">
                    <div class="flex items-center justify-center gap-4 text-pink-600">
                        <i data-lucide="calendar" class="w-6 h-6"></i> <span class="font-bold text-2xl">23 de Mayo</span>
                    </div>
                    <div class="flex items-center justify-center gap-4 text-pink-600">
                        <i data-lucide="clock" class="w-6 h-6"></i> <span class="font-bold text-2xl">1:00 PM</span>
                    </div>
                    <div class="flex items-center justify-center gap-4 text-pink-600">
                        <i data-lucide="map-pin" class="w-6 h-6"></i> <span class="font-bold text-xl">Rancho La Chula</span>
                    </div>
                    <div class="pt-4 border-t border-pink-100">
                        <p class="text-pink-500 font-medium italic">¡Ven caracterizado de Disney! 🎭</p>
                    </div>
                </div>
            </div>

            <button id="rsvpButton" class="btn-magic text-white font-bold py-5 px-16 rounded-full text-2xl fade-up active:scale-95 transition-transform" style="animation-delay:0.5s;">
                Confirmar Asistencia
            </button>
            <p class="mt-4 text-pink-300 text-xs animate-pulse">Toca la pantalla para activar la música 🎵</p>
        </div>

        <div id="view-form" class="min-h-full flex flex-col items-center justify-center px-4 py-8 hidden relative z-10">
            <div class="princess-card rounded-[2.5rem] p-8 max-w-sm w-full shadow-lg space-y-6">
                <h2 class="text-pink-600 text-center" style="font-family:'Great Vibes',cursive; font-size:3.5rem;">Registro Real</h2>
                
                <input type="text" id="guest-name" placeholder="Tu Nombre o Familia" class="w-full rounded-2xl px-5 py-4 border-2 border-pink-100 outline-none focus:border-pink-500 text-gray-700 bg-white/50">
                
                <div class="space-y-4">
                    <div class="flex justify-between items-center bg-white/40 p-4 rounded-2xl">
                        <span class="font-bold text-pink-700">👨‍👩‍👧 Adultos</span>
                        <div class="flex items-center gap-4">
                            <button class="counter-btn" onclick="changeCount('adults', -1)">-</button>
                            <span id="count-adults" class="font-bold text-pink-600 text-xl w-6 text-center">1</span>
                            <button class="counter-btn" onclick="changeCount('adults', 1)">+</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-blue-50/40 p-4 rounded-2xl">
                        <span class="font-bold text-blue-700">👦 Niños</span>
                        <div class="flex items-center gap-4">
                            <button class="counter-btn" style="color:#3b82f6" onclick="changeCount('boys', -1)">-</button>
                            <span id="count-boys" class="font-bold text-blue-500 text-xl w-6 text-center">0</span>
                            <button class="counter-btn" style="color:#3b82f6" onclick="changeCount('boys', 1)">+</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-pink-50/40 p-4 rounded-2xl">
                        <span class="font-bold text-pink-500">👧 Niñas</span>
                        <div class="flex items-center gap-4">
                            <button class="counter-btn" onclick="changeCount('girls', -1)">-</button>
                            <span id="count-girls" class="font-bold text-pink-500 text-xl w-6 text-center">0</span>
                            <button class="counter-btn" onclick="changeCount('girls', 1)">+</button>
                        </div>
                    </div>
                </div>

                <button id="sendWspButton" class="btn-magic text-white font-bold py-5 rounded-full w-full text-xl shadow-lg">
                    Confirmar por WhatsApp
                </button>
                <button onclick="showInvite()" class="text-pink-400 text-sm font-bold w-full text-center">← Regresar</button>
            </div>
        </div>
    </div>

    <script>
        const counts = { adults: 1, boys: 0, girls: 0 };
        const myPhone = "522281276797";
        const bgMusic = document.getElementById('bgMusic');
        const magicSound = document.getElementById('magicSound');
        let audioIniciado = false;

        // INICIAR AUDIO AL TOCAR CUALQUIER PARTE (Para bypass de navegadores)
        document.addEventListener('click', () => {
            if (!audioIniciado) {
                bgMusic.play();
                bgMusic.volume = 0.5;
                audioIniciado = true;
            }
        }, { once: true });

        // Partículas cayendo
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle-particle';
            sparkle.innerHTML = ['✨', '✦', '⭐', '🌸'][Math.floor(Math.random() * 4)];
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = '-20px';
            sparkle.style.fontSize = (Math.random() * 20 + 10) + 'px';
            sparkle.style.animationDuration = (Math.random() * 4 + 3) + 's';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 6000);
        }
        setInterval(createSparkle, 250);

        // Estela del mouse
        document.addEventListener('mousemove', (e) => {
            const trail = document.createElement('div');
            trail.className = 'magic-trail';
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 800);
        });

        // RSVP Logic
        document.getElementById('rsvpButton').addEventListener('click', () => {
            magicSound.play();
            setTimeout(() => {
                document.getElementById('view-invite').classList.add('hidden');
                document.getElementById('view-form').classList.remove('hidden');
            }, 400);
        });

        function showInvite() {
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-invite').classList.remove('hidden');
        }

        function changeCount(type, delta) {
            counts[type] = Math.max(0, counts[type] + delta);
            if (type === 'adults') counts[type] = Math.max(1, counts[type]);
            document.getElementById('count-' + type).innerText = counts[type];
        }

        document.getElementById('sendWspButton').addEventListener('click', () => {
            const name = document.getElementById('guest-name').value.trim();
            if(!name) return alert("Por favor, escribe tu nombre 👸");
            
            let msg = `🎀 *Confirmación Mágica* 🎀\n\n`;
            msg += `👑 Fiesta de *Mariel*\n`;
            msg += `📝 Nombre: *${name}*\n`;
            msg += `👨‍👩‍👧 Adultos: *${counts.adults}*\n`;
            if(counts.boys > 0) msg += `👦 Niños: *${counts.boys}*\n`;
            if(counts.girls > 0) msg += `👧 Niñas: *${counts.girls}*\n`;
            msg += `\n¡Ahí estaremos! 🏰✨`;
            
            window.open(`https://wa.me/${myPhone}?text=${encodeURIComponent(msg)}`);
        });

        lucide.createIcons();
    </script>
</body>
</html>
